apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: onelink-server
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Escala até zero quando sem tráfego (reduz custos)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # Número máximo de requisições simultâneas por instância
        autoscaling.knative.dev/target: "80"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/onelink/onelink-server:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
